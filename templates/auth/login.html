{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — UIST-2ITS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        .btn-outline-purple {
            color: #6f42c1;
            border-color: #6f42c1;
        }
        .btn-outline-purple:hover {
            background-color: #6f42c1;
            color: white;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="card login-card">
            <div class="login-logo">
                <img src="{% static 'images/logo2.png' %}" alt="UIST" class="img-fluid" onerror="this.style.display='none'">
            </div>
            <h1 class="login-title">Connexion</h1>
            <p class="login-subtitle">Entrez votre matricule et mot de passe</p>

            {% if messages %}
                {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                {% endfor %}
            {% endif %}

            <form method="POST" action="{% url 'accounts:login' %}">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="matricule" class="form-label">Matricule</label>
                    <input type="text" class="form-control" id="matricule" name="matricule"
                           placeholder="Ex: ETU-2026-A7K3" required autofocus>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label">Mot de passe</label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="password" name="password"
                               placeholder="Votre mot de passe" required>
                        <button type="button" class="btn btn-outline-secondary" onclick="togglePwd()">
                            <i class="bi bi-eye" id="eye-icon"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-vert w-100 py-2 fw-bold">
                    <i class="bi bi-box-arrow-in-right"></i> Se connecter
                </button>
            </form>

            <div class="mt-3 text-center">
                <a href="/" class="text-muted small"><i class="bi bi-arrow-left"></i> Retour à l'accueil</a>
            </div>
            
            <!-- Accès rapides pour tests -->
            <hr class="my-4">
            <p class="text-center text-muted small mb-2">Accès rapides (tests)</p>
            <div class="d-flex flex-wrap gap-2 justify-content-center">
                <button type="button" class="btn btn-sm btn-outline-primary" onclick="fillLogin('SA-2026-5HJV', 'admin123')">Super Admin</button>
                <button type="button" class="btn btn-sm btn-outline-primary" onclick="fillLogin('DIR-2026-1SXM', 'directeur123')">Directeur</button>
                <button type="button" class="btn btn-sm btn-outline-info" onclick="fillLogin('G1-2026-L23C', 'gestion1123')">Gestion 1</button>
                <button type="button" class="btn btn-sm btn-outline-info" onclick="fillLogin('G2-2026-EPRT', 'gestion2123')">Gestion 2</button>
                <button type="button" class="btn btn-sm btn-outline-info" onclick="fillLogin('G3-2026-56WD', 'gestion3123')">Gestion 3</button>
                <button type="button" class="btn btn-sm btn-outline-purple" onclick="fillLogin('COM-2026-001', 'communication123')">Communication</button>
                <button type="button" class="btn btn-sm btn-outline-success" onclick="fillLogin('ENS-2026-TZMK', 'enseignant123')">Enseignant</button>
                <button type="button" class="btn btn-sm btn-outline-warning" onclick="fillLogin('ETU-2026-1K3B', 'etudiant123')">Étudiant</button>
                <button type="button" class="btn btn-sm btn-outline-secondary" onclick="fillLogin('PAR-2026-CAH4', 'parent123')">Parent</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function togglePwd() {
            var p = document.getElementById('password');
            var i = document.getElementById('eye-icon');
            if (p.type === 'password') { p.type = 'text'; i.className = 'bi bi-eye-slash'; }
            else { p.type = 'password'; i.className = 'bi bi-eye'; }
        }
        function fillLogin(mat, pwd) {
            document.getElementById('matricule').value = mat;
            document.getElementById('password').value = pwd;
        }
    </script>
</body>
</html>
